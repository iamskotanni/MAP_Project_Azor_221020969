{% extends "layout.html" %}
{% block content %}

<h1>Login</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post">
    <label>Employee Name</label>
    <input name="name" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button>Login</button>
</form>

{% endblock %}
